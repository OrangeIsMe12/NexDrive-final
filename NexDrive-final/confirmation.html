<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NexDrive — Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--navy:#0a1628;--electric:#2979ff;--elec-l:#5b9fff;--green:#34d399;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif}
        body{background:#0a1628;color:#fff;font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
        nav{position:fixed;top:0;left:0;right:0;z-index:100;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:linear-gradient(180deg,#0e1e3a 0%,#0a1628 100%);border-bottom:1px solid rgba(41,121,255,0.2);backdrop-filter:blur(24px)}
        nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,159,255,0.5) 50%,transparent);pointer-events:none}
        .logo{display:flex;align-items:center;text-decoration:none}
        .back-link{display:flex;align-items:center;gap:8px;font-size:.82rem;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
        .back-link:hover{color:#fff}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;z-index:1}
 
        /* Glow vert */
        .glow{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);width:700px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(52,211,153,0.07),transparent 65%);pointer-events:none;z-index:0}
 
        .card{width:100%;max-width:500px;background:rgba(14,22,42,0.88);border:1px solid rgba(52,211,153,0.18);border-radius:22px;overflow:hidden;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(52,211,153,0.06),0 24px 80px rgba(0,0,0,0.5);animation:fu .7s cubic-bezier(.16,1,.3,1) both;position:relative}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(52,211,153,0.5) 40%,rgba(91,159,255,0.4) 70%,transparent)}
        @keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
 
        /* Check animé */
        .check-hero{display:flex;flex-direction:column;align-items:center;padding:40px 32px 28px;text-align:center}
        .check-ring{width:80px;height:80px;border-radius:50%;background:rgba(52,211,153,0.1);border:2px solid rgba(52,211,153,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pop .5s cubic-bezier(.16,1,.3,1) .2s both}
        @keyframes pop{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
        .check-ring svg{animation:draw .4s ease .5s both}
        @keyframes draw{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
        .hero-tag{font-size:.6rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:10px}
        .hero-title{font-family:var(--serif);font-size:2rem;font-weight:300;line-height:1.2;margin-bottom:6px}
        .hero-title em{font-style:italic;color:var(--elec-l)}
        .hero-sub{font-size:.85rem;color:rgba(255,255,255,.38);line-height:1.6;max-width:340px}
 
        /* Véhicule */
        .vehicle-section{margin:0 28px 24px;background:rgba(255,255,255,0.04);border:1px solid rgba(91,159,255,0.12);border-radius:14px;padding:18px 20px}
        .v-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .v-label{font-size:.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2)}
        .v-badge{font-size:.62rem;padding:3px 10px;border-radius:100px;background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2);font-weight:600}
        .v-name{font-family:var(--serif);font-size:1.5rem;font-weight:300;color:#fff;margin-bottom:3px}
        .v-sub{font-size:.76rem;color:rgba(91,159,255,.6);margin-bottom:14px}
        .v-row{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid rgba(41,121,255,0.1)}
        .v-price{font-family:var(--serif);font-size:1.7rem;font-weight:300;color:#fff}
        .v-price small{font-size:.72rem;color:rgba(255,255,255,.3);font-family:var(--sans);font-weight:300}
        .v-via{font-size:.7rem;color:rgba(255,255,255,.2)}
 
        /* Boutons */
        .actions{padding:0 28px 28px;display:flex;flex-direction:column;gap:10px}
        .btn-main{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px;border-radius:12px;background:linear-gradient(135deg,#059669,var(--green));border:none;color:#fff;font-family:var(--sans);font-size:.95rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .3s;box-shadow:0 4px 24px rgba(52,211,153,.25)}
        .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(52,211,153,.38)}
        .btn-sec{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:var(--sans);font-size:.85rem;text-decoration:none;transition:all .25s}
        .btn-sec:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8)}
        .btn-logout{background:none;border:none;color:rgba(255,255,255,.18);font-family:var(--sans);font-size:.72rem;cursor:pointer;padding:6px;transition:color .2s}
        .btn-logout:hover{color:rgba(220,38,38,.5)}
        .note{padding:0 28px 24px;font-size:.7rem;color:rgba(255,255,255,.15);text-align:center;line-height:1.6;border-top:1px solid rgba(255,255,255,.05);padding-top:16px;margin-top:-4px}
 
        .spinner{width:32px;height:32px;border:3px solid rgba(41,121,255,.2);border-top-color:var(--electric);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:520px){nav{padding:0 20px;height:60px}.actions{padding:0 20px 20px}.vehicle-section{margin:0 20px 20px}.check-hero{padding:30px 20px 20px}}
    </style>
</head>
<body>
<div class="glow"></div>
<nav>
    <a href="index.html" class="logo"><img src="logo/image-removebg-preview.png" alt="NexDrive" style="height:100px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(41,121,255,0.45))"/></a>
    <a href="vehicules.html" class="back-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Retour à la flotte</a>
</nav>
<main>
    <div class="card" id="card"><div class="spinner"></div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://igftridkkchvjaxtburi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZnRyaWRra2NodmpheHRidXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxMzgsImV4cCI6MjA4ODY2MzEzOH0.SuUO_seWElDPnm3lnGEEn8OwflJhbocyJjVF8nvrf4Y';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,storageKey:'nexdrive-auth',autoRefreshToken:true,detectSessionInUrl:true}});
const p=new URLSearchParams(window.location.search);
const voiture=p.get('voiture')||'';const prix=p.get('prix')||'—';const sub=p.get('sub')||'';const turoURL=p.get('turo')||'https://turo.com';
var done=false;
sb.auth.onAuthStateChange(function(event,session){
    if(done)return;
    if(event==='INITIAL_SESSION'){
        done=true;
        if(session&&session.user){render(session.user);}
        else{setTimeout(function(){sb.auth.getSession().then(function(r){if(r.data&&r.data.session){render(r.data.session.user);}else{window.location.replace('login.html'+window.location.search);}});},1500);}
    }else if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED')&&session&&session.user&&!done){done=true;render(session.user);}
});
function getInit(u){var n=(u.user_metadata&&(u.user_metadata.full_name||u.user_metadata.name))||u.email||'';var p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function render(user){
    var name=(user.user_metadata&&(user.user_metadata.full_name||user.user_metadata.name))||user.email||'Client';
    var init=getInit(user);
    document.getElementById('card').innerHTML=
        '<div class="check-hero">'
        +'<div class="check-ring"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>'
        +'<div class="hero-tag">Réservation</div>'
        +'<div class="hero-title">Prêt à <em>rouler</em> !</div>'
        +'<div class="hero-sub">Bonjour '+name.split(' ')[0]+' ! Complétez votre réservation sur Turo — assurance incluse, contrat automatique.</div>'
        +'</div>'
        +(voiture?'<div class="vehicle-section"><div class="v-top"><span class="v-label">Votre sélection</span><span class="v-badge">✓ Disponible</span></div><div class="v-name">'+voiture+'</div><div class="v-sub">'+sub+'</div><div class="v-row"><div class="v-price">'+prix+'<small> /jour</small></div><div class="v-via">via Turo</div></div></div>':'')
        +'<div class="actions">'
        +(voiture?'<a href="'+turoURL+'" target="_blank" class="btn-main">Réserver sur Turo <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>':'<a href="vehicules.html" class="btn-main">Voir la flotte →</a>')
          +'<button class="btn-logout" onclick="logout()">Se déconnecter</button>'
        +'</div>'
        +(voiture?'<div class="note">En cliquant Réserver sur Turo, vous serez redirigé vers Turo pour finaliser votre réservation.</div>':'');
}
async function logout(){await sb.auth.signOut();window.location.replace('login.html');}
</script>
</body>
</html>
