<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexDrive — Québec</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0a1628;--blue:#1454d4;--electric:#2979ff;--elec-l:#5b9fff;
  --chrome:#7a9ab8;--chrome3:#c4d8e8;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--navy);color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;}
 
/* ── STARFIELD ── */
#sc{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
 
/* ── GLOW ── */
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:600px;border-radius:50%;background:radial-gradient(ellipse,rgba(41,121,255,.1),transparent 65%);pointer-events:none;z-index:0;}
 
/* ── CONTENT ── */
.wrap{position:relative;z-index:1;text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:0;}
 
/* Logo */
.logo-wrap{margin-bottom:48px;animation:fu .8s ease .1s both;}
.logo-img{height:90px;width:auto;object-fit:contain;filter:drop-shadow(0 0 16px rgba(41,121,255,.5));}
 
/* Titre */
.title{font-family:var(--serif);font-size:clamp(2.8rem,7vw,5.5rem);font-weight:300;line-height:1.05;letter-spacing:-1px;margin-bottom:16px;animation:su .9s cubic-bezier(.16,1,.3,1) .2s both;}
.title em{font-style:italic;background:linear-gradient(105deg,var(--electric),var(--blue),var(--chrome));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
 
/* Tagline */
.tagline{font-size:.78rem;font-weight:400;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:64px;animation:fu .8s ease .4s both;}
 
/* Séparateur */
.sep{width:1px;height:40px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.15),transparent);margin-bottom:48px;animation:fu .8s ease .5s both;}
 
/* Question langue */
.lang-q{font-size:.65rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:24px;animation:fu .8s ease .55s both;}
 
/* Boutons langue */
.lang-btns{display:flex;gap:16px;animation:fu .8s ease .65s both;}
 
.lang-btn{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 40px;border-radius:16px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:all .35s cubic-bezier(.22,.68,0,1.2);overflow:hidden;min-width:160px;}
.lang-btn::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(41,121,255,.12),transparent);opacity:0;transition:opacity .3s;}
.lang-btn:hover::before{opacity:1;}
.lang-btn:hover{border-color:rgba(41,121,255,.4);transform:translateY(-6px);box-shadow:0 20px 50px rgba(41,121,255,.2);}
.lang-btn:active{transform:translateY(-2px);}
 
.lang-btn.fr-btn:hover{border-color:rgba(255,100,100,.4);box-shadow:0 20px 50px rgba(220,38,38,.15);}
.lang-btn.fr-btn::before{background:linear-gradient(135deg,rgba(220,38,38,.08),transparent);}
 
.lang-flag{font-size:2.2rem;line-height:1;}
.lang-code{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:#fff;line-height:1;}
.lang-name{font-size:.62rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);}
 
/* Hover effects */
.lang-btn:hover .lang-code{background:linear-gradient(90deg,var(--electric),var(--elec-l));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.lang-btn.fr-btn:hover .lang-code{background:linear-gradient(90deg,#ff6b6b,#ff4444);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
 
/* Ou divider */
.or{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.15);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;}
.or::before,.or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);display:none;}
 
/* Footer */
.footer-note{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:.62rem;color:rgba(255,255,255,.15);letter-spacing:1px;white-space:nowrap;animation:fu .8s ease .9s both;}
 
/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{transform:translateY(80%);opacity:0}to{transform:translateY(0);opacity:1}}
 
/* Transition sortie */
body.leaving{pointer-events:none;}
body.leaving .wrap{animation:leave .5s ease forwards;}
@keyframes leave{to{opacity:0;transform:translateY(-20px)}}
 
@media(max-width:520px){
  .lang-btns{flex-direction:column;gap:12px;}
  .lang-btn{min-width:200px;padding:22px 32px;}
  .title{font-size:clamp(2.2rem,10vw,3.5rem);}
}
</style>
</head>
<body>
 
<canvas id="sc"></canvas>
<div class="glow"></div>
 
<div class="wrap">
 
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="logo/image-removebg-preview.png" alt="NexDrive" class="logo-img"/>
  </div>
 
  <!-- Titre -->
  <h1 class="title">Nex<em>Drive</em></h1>
  <div class="tagline">Location de véhicules premium · Québec</div>
 
  <div class="sep"></div>
 
  <!-- Choix de langue -->
  <div class="lang-q">Choisissez votre langue / Choose your language</div>
 
  <div class="lang-btns">
 
    <!-- FR -->
    <button class="lang-btn fr-btn" onclick="goLang('fr')" aria-label="Français">
      
      <div class="lang-code">FR</div>
      <div class="lang-name">Français</div>
    </button>
 
    <!-- EN -->
    <button class="lang-btn en-btn" onclick="goLang('en')" aria-label="English">
      
      <div class="lang-code">EN</div>
      <div class="lang-name">English</div>
    </button>
 
  </div>
 
</div>
 
<div class="footer-note">NexDrive — Québec, Canada © 2026</div>
 
<script>
/* ── CHOIX DE LANGUE ── */
function goLang(lang) {
  localStorage.setItem('nd_lang', lang);
  // Animation de sortie
  document.body.classList.add('leaving');
  setTimeout(function() {
    window.location.href = 'index.html';
  }, 450);
}
 
/* ── Si déjà une langue choisie → skip la landing ── */
/* Décommente si tu veux bypass automatique :
if (localStorage.getItem('nd_lang')) {
  window.location.replace('index.html');
}
*/
 
/* ── STARFIELD ── */
(function(){
  var c=document.getElementById('sc'),x=c.getContext('2d'),W,H,stars=[],raf,last=0;
  function rnd(a,b){return a+Math.random()*(b-a);}
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=[];
    var n=Math.min(Math.max(Math.floor(W*H/2200),120),320);
    for(var i=0;i<n;i++)stars.push(mk());
  }
  function mk(){
    var t=Math.random(),r,col,bA,spike;
    if(t<.5){r=rnd(.2,.5);col='15,35,70';bA=rnd(.08,.2);spike=false;}
    else if(t<.78){r=rnd(.4,.9);col='25,80,180';bA=rnd(.12,.28);spike=false;}
    else if(t<.92){r=rnd(.7,1.3);col='40,100,200';bA=rnd(.18,.35);spike=false;}
    else{r=rnd(1.1,1.9);col='60,130,230';bA=rnd(.28,.48);spike=true;}
    return{x:Math.random()*W,y:Math.random()*H,r:r,bA:bA,al:bA,col:col,vx:(Math.random()-.5)*rnd(.1,.3),vy:(Math.random()-.5)*rnd(.1,.3),ph:Math.random()*Math.PI*2,spd:rnd(.4,1.2),spike:spike,tw:rnd(.25,.55)};
  }
  function loop(ts){
    var dt=Math.min((ts-last)/16,2);last=ts;x.clearRect(0,0,W,H);
    for(var s of stars){
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      if(s.x<-10)s.x=W+10;if(s.x>W+10)s.x=-10;if(s.y<-10)s.y=H+10;if(s.y>H+10)s.y=-10;
      s.ph+=s.spd*.013*dt;
      s.al=Math.max(.04,s.bA*(1-s.tw)+s.bA*s.tw*Math.max(0,Math.sin(s.ph)*Math.sin(s.ph*2.1+.9)));
      var a=s.al;
      x.save();
      if(s.r>1.2){
        var g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
        g.addColorStop(0,'rgba('+s.col+','+(a*.5)+')');g.addColorStop(1,'rgba('+s.col+',0)');
        x.globalAlpha=1;x.fillStyle=g;x.beginPath();x.arc(s.x,s.y,s.r*4,0,Math.PI*2);x.fill();
      }
      if(s.spike){
        var lens=[s.r*7,s.r*5,s.r*4,s.r*4],angles=[0,Math.PI/2,Math.PI/4,Math.PI*3/4];
        for(var i=0;i<4;i++){
          var lg=x.createLinearGradient(s.x+Math.cos(angles[i])*lens[i],s.y+Math.sin(angles[i])*lens[i],s.x-Math.cos(angles[i])*lens[i],s.y-Math.sin(angles[i])*lens[i]);
          lg.addColorStop(0,'rgba('+s.col+',0)');lg.addColorStop(.5,'rgba('+s.col+','+(a*.8)+')');lg.addColorStop(1,'rgba('+s.col+',0)');
          x.strokeStyle=lg;x.lineWidth=s.r*.3;x.beginPath();x.moveTo(s.x+Math.cos(angles[i])*lens[i],s.y+Math.sin(angles[i])*lens[i]);x.lineTo(s.x-Math.cos(angles[i])*lens[i],s.y-Math.sin(angles[i])*lens[i]);x.stroke();
        }
      }
      x.shadowBlur=s.r*6;x.shadowColor='rgba('+s.col+','+a+')';x.globalAlpha=a;x.fillStyle='rgba('+s.col+',1)';x.beginPath();x.arc(s.x,s.y,s.r*.8,0,Math.PI*2);x.fill();
      x.restore();
    }
    x.globalAlpha=1;raf=requestAnimationFrame(loop);
  }
  window.addEventListener('resize',function(){cancelAnimationFrame(raf);resize();raf=requestAnimationFrame(loop);});
  resize();raf=requestAnimationFrame(loop);
})();
</script>
</body>
</html>
