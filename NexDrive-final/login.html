<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexDrive — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
 
<!-- ✅ SUPABASE SDK — une seule fois, gère tout -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0a1628;--navy2:#0f2040;--blue:#1454d4;--electric:#2979ff;--elec-l:#5b9fff;
  --ink2:#3a5068;--ink3:#6a8aa8;--border:rgba(10,22,40,0.1);
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif
}
html{scroll-behavior:smooth}
body{background:#0a1628;color:#fff;font-family:var(--sans);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
#sc{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
 
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:linear-gradient(180deg,#0e1e3a 0%,#0a1628 100%);border-bottom:1px solid rgba(41,121,255,0.2);backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(41,121,255,0.08),0 4px 32px rgba(10,22,40,0.5)}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(41,121,255,0.2) 15%,rgba(91,159,255,0.5) 35%,rgba(120,180,255,0.7) 50%,rgba(91,159,255,0.5) 65%,rgba(41,121,255,0.2) 85%,transparent 100%);pointer-events:none}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.back-link{display:flex;align-items:center;gap:8px;font-size:.82rem;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
.back-link:hover{color:rgba(255,255,255,.85)}
.back-link svg{opacity:.5}
 
/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;z-index:1}
 
/* CARD */
.login-card{width:100%;max-width:440px;background:rgba(14,22,42,0.85);border:1px solid rgba(41,121,255,0.15);border-radius:20px;padding:44px 40px;backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(41,121,255,0.06),0 24px 80px rgba(0,0,0,0.5),0 0 60px rgba(41,121,255,0.08);animation:fu .7s cubic-bezier(.16,1,.3,1) both}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
 
.card-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.6rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--electric);margin-bottom:16px}
.card-eyebrow::before{content:'';width:14px;height:1px;background:var(--electric)}
.card-title{font-family:var(--serif);font-size:2rem;font-weight:300;line-height:1.15;letter-spacing:-.3px;margin-bottom:6px}
.card-title em{font-style:italic;color:var(--elec-l)}
.card-sub{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.38);margin-bottom:36px;line-height:1.6}
 
/* SOCIAL BUTTONS */
.social-btn{width:100%;display:flex;align-items:center;gap:14px;padding:13px 20px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,.82);font-family:var(--sans);font-size:.88rem;font-weight:400;cursor:pointer;transition:all .22s;margin-bottom:10px;text-decoration:none;position:relative;overflow:hidden}
.social-btn:hover{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.08);color:#fff;transform:translateY(-1px)}
.social-btn .icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.social-btn .lbl{flex:1;text-align:left}
.social-btn .arr{font-size:.8rem;color:rgba(255,255,255,.2);transition:transform .2s,color .2s}
.social-btn:hover .arr{transform:translateX(4px);color:rgba(255,255,255,.5)}
.social-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
 
.btn-google:hover{border-color:rgba(66,133,244,0.4);background:rgba(66,133,244,0.08)}
.btn-facebook:hover{border-color:rgba(24,119,242,0.4);background:rgba(24,119,242,0.08)}
.btn-apple:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1)}
.btn-phone:hover{border-color:rgba(41,121,255,0.4);background:rgba(41,121,255,0.08)}
 
/* DIVIDER */
.divider{display:flex;align-items:center;gap:14px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}
.divider span{font-size:.72rem;color:rgba(255,255,255,.22);letter-spacing:1px;white-space:nowrap}
 
/* EMAIL FORM */
.input-wrap{margin-bottom:12px}
.input-wrap label{display:block;font-size:.72rem;font-weight:500;letter-spacing:.5px;color:rgba(255,255,255,.38);margin-bottom:7px;text-transform:uppercase}
.input-wrap input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;color:#fff;font-family:var(--sans);font-size:.9rem;font-weight:300;outline:none;transition:all .22s}
.input-wrap input::placeholder{color:rgba(255,255,255,.2)}
.input-wrap input:focus{border-color:rgba(41,121,255,.5);background:rgba(41,121,255,0.06);box-shadow:0 0 0 3px rgba(41,121,255,0.12)}
.input-wrap input.error{border-color:rgba(248,113,113,0.5);background:rgba(248,113,113,0.06)}
 
.btn-submit{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#1454d4,#2979ff);border:none;color:#fff;font-family:var(--sans);font-size:.9rem;font-weight:500;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(41,121,255,.3);margin-top:4px;letter-spacing:.3px}
.btn-submit:hover{background:linear-gradient(135deg,#1a65f0,#3d8bff);transform:translateY(-2px);box-shadow:0 8px 28px rgba(41,121,255,.4)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
 
/* MESSAGES */
.msg{display:none;padding:10px 14px;border-radius:9px;font-size:.8rem;margin-top:10px;line-height:1.5}
.msg.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);color:#34d399}
.msg.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:#f87171}
.msg.show{display:block}
 
/* MAGIC LINK */
.magic-link{display:flex;align-items:center;justify-content:center;gap:7px;font-size:.78rem;color:rgba(255,255,255,.3);margin-top:14px;cursor:pointer;transition:color .2s;background:none;border:none;width:100%;font-family:var(--sans)}
.magic-link:hover{color:rgba(255,255,255,.6)}
.magic-link svg{opacity:.5}
 
/* FOOTER */
.card-footer-note{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:.72rem;color:rgba(255,255,255,.2);line-height:1.7}
.card-footer-note a{color:rgba(91,159,255,.6);text-decoration:none}
.card-footer-note a:hover{color:var(--elec-l)}
 
/* GLOW */
.glow-bg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(ellipse,rgba(41,121,255,0.1),transparent 65%);pointer-events:none;z-index:0}
 
/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
 
@media(max-width:520px){
  nav{padding:0 20px;height:60px}
  main{padding:88px 16px 40px}
  .login-card{padding:32px 24px}
  .card-title{font-size:1.7rem}
}
</style>
</head>
<body>
<canvas id="sc"></canvas>
<div class="glow-bg"></div>
 
<nav>
  <a href="index.html" class="logo">
    <img src="logo/image-removebg-preview.png" alt="NexDrive" style="height:100px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(41,121,255,0.45))"/>
  </a>
  <a href="vehicules.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Retour à la flotte
  </a>
</nav>
 
<main>
  <div class="login-card">
    <div class="card-eyebrow">Première visite ?</div>
    <h1 class="card-title">Créez votre <em>compte</em></h1>
    <p class="card-sub">Connectez-vous en 1 clic pour réserver votre véhicule, suivre vos locations et accéder à votre tableau de bord.</p>
 
    <!-- GOOGLE -->
    <button class="social-btn btn-google" id="btnGoogle">
      <span class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      </span>
      <span class="lbl">Continuer avec Google</span>
      <span class="arr">→</span>
    </button>
 
    <!-- FACEBOOK -->
    <button class="social-btn btn-facebook" id="btnFacebook">
      <span class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </span>
      <span class="lbl">Continuer avec Facebook</span>
      <span class="arr">→</span>
    </button>
 
    <!-- APPLE -->
    <button class="social-btn btn-apple" id="btnApple">
      <span class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      </span>
      <span class="lbl">Continuer avec Apple</span>
      <span class="arr">→</span>
    </button>
 
    <!-- TÉLÉPHONE -->
    <button class="social-btn btn-phone" id="btnPhone">
      <span class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(91,159,255,0.9)" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.72 6.72l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </span>
      <span class="lbl">Continuer avec mon numéro</span>
      <span class="arr">→</span>
    </button>
 
    <!-- DIVIDER -->
    <div class="divider"><span>ou par courriel</span></div>
 
    <!-- EMAIL -->
    <div class="input-wrap">
      <label>Adresse courriel</label>
      <input type="email" id="emailInput" placeholder="vous@exemple.com"/>
    </div>
    <button class="btn-submit" id="btnEmail">Recevoir un lien de connexion</button>
 
    <!-- Message succès / erreur -->
    <div class="msg" id="msgBox"></div>
 
    <button class="magic-link" id="magicInfo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      Qu'est-ce qu'un lien magique ?
    </button>
 
    <div class="card-footer-note">
      En continuant, vous acceptez nos <a href="conditions.html">conditions d'utilisation</a> et notre <a href="confidentialite.html">politique de confidentialité</a>.
    </div>
  </div>
</main>
 
<script>
// ════════════════════════════════════════════════
// ✅ CONFIGURATION SUPABASE — remplacez ces 2 valeurs
// Trouvez-les dans : Supabase → Project Settings → API
// ════════════════════════════════════════════════
const SUPABASE_URL  = 'https://VOTRE_PROJET.supabase.co';
const SUPABASE_ANON = 'VOTRE_CLE_ANON_PUBLIQUE';
 
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
 
// ── Helpers UI ──
function showMsg(text, type) {
  var box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg ' + type + ' show';
}
function setLoading(btn, loading, original) {
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connexion…';
  } else {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}
 
// ── EMAIL (lien magique) ──
document.getElementById('btnEmail').addEventListener('click', async function() {
  var email = document.getElementById('emailInput').value.trim();
  var input = document.getElementById('emailInput');
 
  if (!email || !email.includes('@')) {
    input.classList.add('error');
    showMsg('Veuillez entrer une adresse courriel valide.', 'error');
    input.focus();
    return;
  }
  input.classList.remove('error');
 
  var btn = this;
  var orig = btn.innerHTML;
  setLoading(btn, true);
 
  var result = await sb.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.origin + '/compte.html' }
  });
 
  setLoading(btn, false, orig);
 
  if (result.error) {
    showMsg('Erreur : ' + result.error.message, 'error');
  } else {
    showMsg('✅ Lien envoyé ! Vérifiez votre boîte courriel et cliquez sur le lien.', 'success');
  }
});
 
// ── GOOGLE ──
document.getElementById('btnGoogle').addEventListener('click', async function() {
  var btn = this;
  var orig = btn.innerHTML;
  setLoading(btn, true);
  var result = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/compte.html' }
  });
  if (result.error) {
    setLoading(btn, false, orig);
    showMsg('Erreur Google : ' + result.error.message, 'error');
  }
  // Si succès, Supabase redirige automatiquement
});
 
// ── FACEBOOK ──
document.getElementById('btnFacebook').addEventListener('click', async function() {
  var btn = this;
  var orig = btn.innerHTML;
  setLoading(btn, true);
  var result = await sb.auth.signInWithOAuth({
    provider: 'facebook',
    options: { redirectTo: window.location.origin + '/compte.html' }
  });
  if (result.error) {
    setLoading(btn, false, orig);
    showMsg('Erreur Facebook : ' + result.error.message, 'error');
  }
});
 
// ── APPLE ──
document.getElementById('btnApple').addEventListener('click', async function() {
  var btn = this;
  var orig = btn.innerHTML;
  setLoading(btn, true);
  var result = await sb.auth.signInWithOAuth({
    provider: 'apple',
    options: { redirectTo: window.location.origin + '/compte.html' }
  });
  if (result.error) {
    setLoading(btn, false, orig);
    showMsg('Erreur Apple : ' + result.error.message, 'error');
  }
});
 
// ── TÉLÉPHONE (redirige vers une page dédiée ou affiche un message) ──
document.getElementById('btnPhone').addEventListener('click', function() {
  showMsg('📱 Connexion par téléphone : entrez votre numéro dans le champ courriel avec le format +1XXXXXXXXXX, ou contactez le support.', 'success');
});
 
// ── INFO LIEN MAGIQUE ──
document.getElementById('magicInfo').addEventListener('click', function() {
  showMsg('✨ Un lien magique est envoyé à votre courriel. Cliquez dessus et vous êtes connecté — sans mot de passe !', 'success');
});
 
// ── Effacer erreur à la frappe ──
document.getElementById('emailInput').addEventListener('input', function() {
  this.classList.remove('error');
  var box = document.getElementById('msgBox');
  if (box.classList.contains('error')) box.classList.remove('show');
});
 
// ════════════════════════════════════════════════
// Animation étoiles (inchangée)
// ════════════════════════════════════════════════
(function(){
  var c=document.getElementById('sc'),x=c.getContext('2d'),W,H,stars=[],raf,last=0;
  function rnd(a,b){return a+Math.random()*(b-a)}
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=[];var n=Math.min(Math.max(Math.floor(W*H/2200),140),380);for(var i=0;i<n;i++)stars.push(mk())}
  function mk(){var t=Math.random(),r,col,bA,spike;
    if(t<.5){r=rnd(.2,.5);col='10,20,40';bA=rnd(.06,.16);spike=false}
    else if(t<.78){r=rnd(.4,.8);col='8,18,36';bA=rnd(.10,.22);spike=false}
    else if(t<.92){r=rnd(.7,1.2);col='5,15,30';bA=rnd(.16,.30);spike=false}
    else{r=rnd(1.1,1.8);col='2,10,25';bA=rnd(.25,.42);spike=true}
    return{x:Math.random()*W,y:Math.random()*H,r:r,bA:bA,al:bA,col:col,vx:(Math.random()-.5)*rnd(.12,.38),vy:(Math.random()-.5)*rnd(.12,.38),ph:Math.random()*Math.PI*2,spd:rnd(.5,1.4),spike:spike,twinkleAmt:rnd(.25,.6)}}
  function drawStar(s){var a=s.al;x.save();
    if(s.r>1.5){var g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);g.addColorStop(0,'rgba('+s.col+','+(a*.6)+')');g.addColorStop(0.35,'rgba('+s.col+','+(a*.18)+')');g.addColorStop(1,'rgba('+s.col+',0)');x.globalAlpha=1;x.fillStyle=g;x.beginPath();x.arc(s.x,s.y,s.r*5,0,Math.PI*2);x.fill()}
    x.shadowBlur=s.r*7;x.shadowColor='rgba('+s.col+','+a+')';x.globalAlpha=a;x.fillStyle='rgba('+s.col+',1)';x.beginPath();x.arc(s.x,s.y,s.r*.8,0,Math.PI*2);x.fill();
    if(s.spike){var angles=[0,Math.PI/2,Math.PI/4,Math.PI*3/4],lens=[s.r*8,s.r*6,s.r*4.5,s.r*4.5];for(var i=0;i<4;i++){var lg=x.createLinearGradient(s.x+Math.cos(angles[i])*lens[i],s.y+Math.sin(angles[i])*lens[i],s.x-Math.cos(angles[i])*lens[i],s.y-Math.sin(angles[i])*lens[i]);lg.addColorStop(0,'rgba('+s.col+',0)');lg.addColorStop(0.5,'rgba('+s.col+','+(a*.85)+')');lg.addColorStop(1,'rgba('+s.col+',0)');x.strokeStyle=lg;x.lineWidth=s.r*.35;x.beginPath();x.moveTo(s.x+Math.cos(angles[i])*lens[i],s.y+Math.sin(angles[i])*lens[i]);x.lineTo(s.x-Math.cos(angles[i])*lens[i],s.y-Math.sin(angles[i])*lens[i]);x.stroke()}}
    x.restore()}
  function loop(ts){var dt=Math.min((ts-last)/16,2);last=ts;x.clearRect(0,0,W,H);
    for(var s of stars){s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.x<-10)s.x=W+10;if(s.x>W+10)s.x=-10;if(s.y<-10)s.y=H+10;if(s.y>H+10)s.y=-10;s.ph+=s.spd*.013*dt;var tw=s.bA*(1-s.twinkleAmt)+s.bA*s.twinkleAmt*Math.max(0,Math.sin(s.ph)*Math.sin(s.ph*2.1+0.9));s.al=Math.max(0.06,tw);drawStar(s)}
    x.globalAlpha=1;raf=requestAnimationFrame(loop)}
  window.addEventListener('resize',function(){cancelAnimationFrame(raf);resize();raf=requestAnimationFrame(loop)});
  resize();raf=requestAnimationFrame(loop)
})();
</script>
</body>
</html>
